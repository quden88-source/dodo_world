<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>환영합니다!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
      background: linear-gradient(135deg, #1a7ab5 0%, #4caf6e 100%);
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 56px 64px;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.2);
      animation: popUp 0.6s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popUp {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .emoji {
      font-size: 72px;
      display: block;
      margin-bottom: 20px;
      animation: wave 1.2s 1s ease-in-out infinite alternate;
    }

    @keyframes wave {
      from { transform: rotate(-10deg) scale(1); }
      to   { transform: rotate(10deg)  scale(1.1); }
    }

    h1 {
      font-size: 36px;
      color: #1a7ab5;
      margin-bottom: 12px;
    }

    p {
      font-size: 18px;
      color: #666;
      line-height: 1.6;
    }

    .main-msg {
      font-size: 22px;
      font-weight: bold;
      color: #1a7ab5;
      background: #eef6ff;
      border-left: 4px solid #4caf6e;
      border-radius: 8px;
      padding: 12px 20px;
      margin-bottom: 16px;
    }

    .stars {
      margin-top: 28px;
      font-size: 28px;
      letter-spacing: 8px;
      animation: twinkle 1.5s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.4; }
      to   { opacity: 1; }
    }

    .back-btn {
      margin-top: 36px;
      padding: 10px 28px;
      font-size: 15px;
      border: 2px solid #1a7ab5;
      border-radius: 8px;
      color: #1a7ab5;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #1a7ab5;
      color: white;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🌍</span>
    <h1>환영합니다!</h1>
    <p class="main-msg">유나야 두두월드에 온걸 환영해!<br>AI에 적응중!</p>
    <p>두두가 당신을 반기고 있어요.<br>함께 멋진 여정을 시작해봐요우!</p>
    <div class="stars">★ ★ ★</div>
    <button class="back-btn" onclick="goBack()">← 돌아가기</button>
  </div>

  <script>
    function goBack() {
      document.body.style.transition = 'opacity 0.5s';
      document.body.style.opacity = '0';
      setTimeout(() => { window.location.href = 'hello.html'; }, 500);
    }
  </script>
</body>
</html>
