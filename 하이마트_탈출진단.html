<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚨 하이마트 탈출 진단기 — STAY or EXIT?</title>
<style>
:root {
  --bg: #0C0E14;
  --s1: #13151E;
  --s2: #1C1F2E;
  --s3: #252840;
  --border: rgba(255,255,255,0.08);
  --text: #E4E7F0;
  --muted: #7A82A0;
  --lotte: #E31837;
  --lotte2: #FF4D6A;
  --green: #00C87A;
  --yellow: #FFB830;
  --blue: #5B8DDB;
  --purple: #A78BFA;
  --orange: #FB923C;
  --r: 16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;
  overflow-x:hidden;
}

/* ── TOPBAR ── */
.topbar{
  background:var(--s1); border-bottom:1px solid var(--border);
  padding:0 32px; height:52px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:12px;font-size:13px;}
.topbar-dot{width:8px;height:8px;border-radius:50%;background:var(--lotte);
  box-shadow:0 0 10px var(--lotte);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.back-btn{
  font-size:12px;color:var(--muted);background:var(--s2);
  border:1px solid var(--border);border-radius:8px;padding:5px 14px;
  cursor:pointer;text-decoration:none;transition:all .2s;
}
.back-btn:hover{color:var(--text);background:var(--s3);}

/* ── SECTIONS ── */
.screen{display:none;}
.screen.active{display:block;}

/* ── LANDING ── */
.landing{
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:40px 20px;
  text-align:center; position:relative; overflow:hidden;
}
.landing::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% 50%,rgba(227,24,55,.12) 0%,transparent 70%);
  pointer-events:none;
}
.landing-emoji{font-size:72px;margin-bottom:20px;animation:bounce .8s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.landing-title{
  font-size:clamp(28px,6vw,52px); font-weight:900; letter-spacing:-1.5px;
  line-height:1.1; margin-bottom:16px;
}
.landing-title .red{color:var(--lotte);}
.landing-title .grn{color:var(--green);}
.landing-sub{
  font-size:16px; color:var(--muted); max-width:540px;
  line-height:1.7; margin-bottom:36px;
}
.landing-sub strong{color:var(--yellow);}
.stat-row{
  display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
  margin-bottom:40px;
}
.stat-pill{
  background:var(--s2); border:1px solid var(--border);
  border-radius:99px; padding:8px 18px; font-size:13px;
  display:flex; align-items:center; gap:6px;
}
.stat-pill .icon{font-size:16px;}
.stat-pill .val{font-weight:700;}
.stat-pill .lbl{color:var(--muted); font-size:11px;}

.start-btn{
  background:linear-gradient(135deg,var(--lotte),#FF6B35);
  color:#fff; font-size:18px; font-weight:800;
  border:none; border-radius:16px; padding:18px 48px;
  cursor:pointer; letter-spacing:-.3px;
  box-shadow:0 8px 30px rgba(227,24,55,.4);
  transition:all .2s; position:relative; overflow:hidden;
}
.start-btn::after{
  content:''; position:absolute; inset:0;
  background:rgba(255,255,255,0); transition:background .2s;
}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(227,24,55,.5);}
.start-btn:hover::after{background:rgba(255,255,255,.08);}
.start-hint{margin-top:14px;font-size:12px;color:var(--muted);}

/* ── QUIZ ── */
.quiz-wrap{
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:60px 20px;
}
.quiz-progress{
  display:flex; gap:8px; margin-bottom:40px;
}
.prog-dot{
  width:36px; height:6px; border-radius:99px;
  background:var(--s3); transition:background .4s;
}
.prog-dot.done{background:var(--lotte);}
.prog-dot.active{background:var(--yellow);}

.q-card{
  background:var(--s1); border:1px solid var(--border);
  border-radius:24px; padding:44px 48px;
  max-width:640px; width:100%; text-align:center;
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.q-num{
  font-size:11px; font-weight:700; letter-spacing:1px;
  color:var(--lotte); text-transform:uppercase; margin-bottom:14px;
}
.q-emoji{font-size:48px; margin-bottom:16px;}
.q-text{
  font-size:22px; font-weight:800; letter-spacing:-.4px;
  line-height:1.35; margin-bottom:32px;
}
.q-options{display:flex;flex-direction:column;gap:10px;}
.q-opt{
  background:var(--s2); border:1.5px solid var(--border);
  border-radius:12px; padding:16px 20px;
  font-size:14px; font-weight:600; text-align:left;
  cursor:pointer; transition:all .2s;
  display:flex; align-items:center; gap:12px;
}
.q-opt:hover{
  background:var(--s3); border-color:rgba(227,24,55,.4);
  transform:translateX(4px);
}
.q-opt-icon{font-size:20px; flex-shrink:0;}
.q-opt-text{}
.q-opt-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── RESULT ── */
.result-wrap{
  min-height:100vh; padding:60px 20px;
  display:flex; flex-direction:column; align-items:center;
}
.result-card{
  max-width:800px; width:100%;
}

/* verdict banner */
.verdict-banner{
  border-radius:24px; padding:48px 40px; text-align:center;
  margin-bottom:24px; position:relative; overflow:hidden;
}
.verdict-banner.exit{
  background:linear-gradient(135deg,rgba(227,24,55,.15),rgba(255,107,53,.1));
  border:1.5px solid rgba(227,24,55,.3);
}
.verdict-banner.stay{
  background:linear-gradient(135deg,rgba(0,200,122,.1),rgba(91,141,219,.1));
  border:1.5px solid rgba(0,200,122,.25);
}
.verdict-banner.caution{
  background:linear-gradient(135deg,rgba(255,184,48,.1),rgba(251,146,60,.08));
  border:1.5px solid rgba(255,184,48,.3);
}
.verdict-banner.deep-stay{
  background:linear-gradient(135deg,rgba(91,141,219,.12),rgba(167,139,250,.1));
  border:1.5px solid rgba(167,139,250,.3);
}
.verdict-emoji{font-size:80px;margin-bottom:12px;display:block;}
.verdict-tag{
  display:inline-block; font-size:11px; font-weight:800; letter-spacing:1.5px;
  text-transform:uppercase; padding:5px 16px; border-radius:99px; margin-bottom:14px;
}
.verdict-banner.exit .verdict-tag      {background:rgba(227,24,55,.2);color:var(--lotte2);}
.verdict-banner.stay .verdict-tag      {background:rgba(0,200,122,.15);color:var(--green);}
.verdict-banner.caution .verdict-tag   {background:rgba(255,184,48,.15);color:var(--yellow);}
.verdict-banner.deep-stay .verdict-tag {background:rgba(167,139,250,.15);color:var(--purple);}
.verdict-title{
  font-size:clamp(26px,4vw,40px); font-weight:900;
  letter-spacing:-1px; line-height:1.2; margin-bottom:12px;
}
.verdict-sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:500px;margin:0 auto;}

/* meme block */
.meme-block{
  background:var(--s1); border:1px solid var(--border);
  border-radius:20px; overflow:hidden; margin-bottom:20px;
}
.meme-label{
  background:var(--s2); padding:10px 20px;
  font-size:10px; font-weight:700; letter-spacing:1px;
  color:var(--muted); text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
.meme-body{padding:24px;}

/* Drake meme */
.drake{display:flex;flex-direction:column;gap:2px;}
.drake-row{
  display:flex; align-items:center; gap:0;
  border-radius:8px; overflow:hidden;
}
.drake-face{
  width:80px; height:80px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:36px;
}
.drake-row.no  .drake-face{background:#2A1520;}
.drake-row.yes .drake-face{background:#122A20;}
.drake-content{
  flex:1; padding:12px 20px; font-size:14px; font-weight:600;
  line-height:1.5;
}
.drake-row.no  .drake-content{background:#1E1015;color:#FF8099;}
.drake-row.yes .drake-content{background:#0F1E16;color:#7DFFBE;}

/* Scoreboard */
.score-wrap{text-align:center;margin:28px 0;}
.score-label{font-size:12px;color:var(--muted);margin-bottom:10px;}
.score-bar-outer{
  height:24px; background:var(--s3); border-radius:99px;
  overflow:hidden; position:relative;
}
.score-bar-fill{
  height:100%; border-radius:99px;
  transition:width 1.2s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(90deg,var(--green),var(--yellow),var(--lotte));
}
.score-ticks{
  display:flex; justify-content:space-between;
  font-size:10px; color:var(--muted); margin-top:8px;
  padding:0 4px;
}

/* Reason grid */
.reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.reason-col{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:20px;}
.reason-col.exit-col{border-color:rgba(227,24,55,.2);}
.reason-col.stay-col{border-color:rgba(0,200,122,.2);}
.reason-header{
  font-size:13px;font-weight:800;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.reason-col.exit-col .reason-header{color:var(--lotte2);}
.reason-col.stay-col .reason-header{color:var(--green);}
.reason-item{
  font-size:12px;color:var(--muted);padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;gap:8px;line-height:1.5;
}
.reason-item:last-child{border:none;}
.reason-item .ri{flex-shrink:0;}

/* This is fine */
.tif{
  background:#1A0F0A; border-radius:12px; padding:20px 24px;
  display:flex; gap:16px; align-items:flex-start;
}
.tif-guy{font-size:48px;flex-shrink:0;}
.tif-bubbles{display:flex;flex-direction:column;gap:8px;}
.tif-bubble{
  background:var(--s3); border-radius:10px; padding:10px 14px;
  font-size:13px; font-weight:600; position:relative;
}
.tif-fire{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:18px;}

/* Gru plan */
.gru-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;border-radius:12px;overflow:hidden;}
.gru-cell{
  padding:20px; font-size:13px; font-weight:600; line-height:1.5;
  text-align:center;
}
.gru-cell:nth-child(1){background:#1A1528;color:var(--purple);}
.gru-cell:nth-child(2){background:#1A2015;color:var(--green);}
.gru-cell:nth-child(3){background:#1A1528;color:var(--purple);}
.gru-cell:nth-child(4){background:#2A1015;color:var(--lotte2);}
.gru-cell .cell-num{
  font-size:10px;font-weight:800;letter-spacing:1px;
  opacity:.6;margin-bottom:8px;text-transform:uppercase;
}
.gru-cell .cell-emoji{font-size:32px;margin-bottom:8px;display:block;}

/* final buttons */
.final-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:28px;}
.fbtn{
  padding:14px 28px; border-radius:12px; font-size:14px; font-weight:700;
  border:none; cursor:pointer; transition:all .2s;
}
.fbtn-retry{background:var(--s2);color:var(--text);border:1.5px solid var(--border);}
.fbtn-retry:hover{background:var(--s3);}
.fbtn-report{
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;
}
.fbtn-report:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(91,141,219,.4);}
.fbtn-share{
  background:linear-gradient(135deg,var(--green),#00A060);
  color:#fff;
}
.fbtn-share:hover{transform:translateY(-2px);}

/* ── UNIVERSAL CARDS ── */
.meme-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:20px;padding:24px;margin-bottom:20px;
}
.meme-card-title{
  font-size:11px;font-weight:700;letter-spacing:.8px;
  color:var(--muted);text-transform:uppercase;margin-bottom:18px;
}

/* ── THINKING MAN meme ── */
.thinking-row{
  display:flex;align-items:center;gap:16px;
  padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);
}
.thinking-row:last-child{border:none;}
.thinking-face{font-size:28px;flex-shrink:0;}
.thinking-q{font-size:13px;font-weight:600;}
.thinking-a{font-size:12px;color:var(--muted);margin-top:2px;}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .q-card{padding:32px 24px;}
  .reason-grid{grid-template-columns:1fr;}
  .gru-grid{grid-template-columns:1fr;}
  .score-row{flex-direction:column;}
  .verdict-title{font-size:26px;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-dot"></div>
    <span>🏪 하이마트 탈출 진단기</span>

<!-- ══════════════════════════════════
     SCREEN 1: LANDING
══════════════════════════════════ -->

    </button>

    <div style="margin-top:56px;max-width:520px;width:100%;">

              "PLUX 잘 되고 있잖아. 괜찮아 다 괜찮아" 🔥🔥🔥
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div><!-- /screen-landing -->

<!-- ══════════════════════════════════
     SCREEN 2: QUIZ
══════════════════════════════════ -->
<div class="screen" id="screen-quiz">
  <div class="quiz-wrap">
    <div class="quiz-progress" id="progress-dots">
      <div class="prog-dot active" id="pd-0"></div>
      <div class="prog-dot" id="pd-1"></div>
      <div class="prog-dot" id="pd-2"></div>
      <div class="prog-dot" id="pd-3"></div>
    </div>
    <div id="q-container"></div>
  </div>
</div><!-- /screen-quiz -->

<!-- ══════════════════════════════════
     SCREEN 3: RESULT
══════════════════════════════════ -->
<div class="screen" id="screen-result">
  <div class="result-wrap">
    <div class="result-card" id="result-content"></div>
  </div>
</div><!-- /screen-result -->

<script>
// ══════════════════════════════════════════
//  QUIZ DATA
// ══════════════════════════════════════════
const questions = [
  {
    num: '01 / 04',
    emoji: '📅',
    text: '하이마트 다닌 지 얼마나 됐어?',
    options: [
      { icon:'🐣', text:'1년 미만', sub:'아직 어리다... 풋풋해', score: 1 },
      { icon:'🌱', text:'1~3년', sub:'이직 황금 타이밍 아닌가?', score: 4 },
      { icon:'🌳', text:'3~5년', sub:'어느새 여기가 내 삶의 루틴', score: 3 },
      { icon:'🏛️', text:'5년 이상', sub:'이미 하이마트가 집이야...', score: 1 },
    ]
  },
  {
    num: '02 / 04',
    emoji: '🧠',
    text: '매일 퇴근하면서 드는 생각이 뭐야?',
    options: [
      { icon:'😮‍💨', text:'"살았다"', sub:'퇴근 = 생존. 내일이 무서워.', score: 5 },
      { icon:'🥱', text:'"그냥... 그냥 다님"', sub:'감정이 없다. 무감각 상태.', score: 3 },
      { icon:'🤔', text:'"PLUX 뭔가 되는 것 같기도?"', sub:'희망의 불씨가 살아있어.', score: 1 },
      { icon:'😊', text:'"오늘도 보람차다!"', sub:'이 사람은 진짜임.', score: 0 },
    ]
  },
  {
    num: '03 / 04',
    emoji: '💭',
    text: '요즘 폰에서 가장 많이 보는 게 뭐야?',
    options: [
      { icon:'📋', text:'다른 회사 채용공고', sub:'이미 마음은 나갔구나...', score: 6 },
      { icon:'📊', text:'하이마트 주가 차트', sub:'내부자로서 촉각을 세우는 중', score: 2 },
      { icon:'😹', text:'커뮤니티 밈/짤', sub:'현실도피 중', score: 3 },
      { icon:'📚', text:'업무 관련 공부', sub:'아직 성장에 투자 중이구나', score: 1 },
    ]
  },
  {
    num: '04 / 04',
    emoji: '👥',
    text: '친구가 "나 하이마트 입사 제안받았어" 하면?',
    options: [
      { icon:'🚨', text:'"야 절대 ㄴㄴ 가지마"', sub:'내가 직접 막는다', score: 6 },
      { icon:'😐', text:'"음... 그럴 수 있지"', sub:'말리진 않지만 응원도 못 하겠어', score: 3 },
      { icon:'🤷', text:'"PLUX팀이면 해볼 만함"', sub:'전략적 판단이 가능한 상태', score: 2 },
      { icon:'👍', text:'"오 좋다! 나는 잘 다니고 있어"', sub:'진성 하이마트인', score: 0 },
    ]
  },
];

let currentQ = 0;
let totalScore = 0;

function startQuiz() {
  document.getElementById('screen-landing').classList.remove('active');
  document.getElementById('screen-quiz').classList.add('active');
  showQuestion(0);
}

function showQuestion(idx) {
  currentQ = idx;
  updateProgress(idx);

  const q = questions[idx];
  const html = `
    <div class="q-card">
      <div class="q-num">${q.num}</div>
      <div class="q-emoji">${q.emoji}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-options">
        ${q.options.map((o, i) => `
          <button class="q-opt" onclick="chooseAnswer(${o.score}, ${idx})">
            <div class="q-opt-icon">${o.icon}</div>
            <div>
              <div class="q-opt-text">${o.text}</div>
              <div class="q-opt-sub">${o.sub}</div>
            </div>
          </button>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('q-container').innerHTML = html;
}

function updateProgress(idx) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('pd-' + i);
    d.classList.remove('active', 'done');
    if (i < idx) d.classList.add('done');
    if (i === idx) d.classList.add('active');
  }
}

function chooseAnswer(score, qIdx) {
  totalScore += score;
  if (qIdx < 3) {
    showQuestion(qIdx + 1);
  } else {
    showResult();
  }
}

function retryQuiz() {
  totalScore = 0;
  currentQ = 0;
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-quiz').classList.add('active');
  showQuestion(0);
}

function shareResult(tag, score) {

  if (navigator.clipboard) {
    navigator.clipboard.writeText(msg).then(() => {
      alert('📋 결과가 클립보드에 복사됐어! 친구한테 보내봐 😂');
    });
  } else {
    alert(msg);
  }
}
