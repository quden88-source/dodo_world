<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #e8f4fd;
    }

    /* 지구 컨테이너 */
    .earth-wrapper {
      margin-bottom: 32px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }

    .earth {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #1a7ab5;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(26,122,181,0.4), inset -12px -8px 0 rgba(0,0,0,0.15);
    }

    /* 회전하는 대륙 레이어 */
    .land-layer {
      position: absolute;
      width: 200%;
      height: 100%;
      top: 0;
      left: 0;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* 대륙 SVG */
    .land-layer svg {
      width: 100%;
      height: 100%;
    }

    /* 눈(눈알) */
    .eyes {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
      z-index: 10;
    }
    .eye {
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: blink 4s infinite;
    }
    .pupil {
      width: 7px;
      height: 7px;
      background: #222;
      border-radius: 50%;
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95%           { transform: scaleY(0.1); }
    }

    /* 입 */
    .mouth {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 14px;
      border: 3px solid white;
      border-top: none;
      border-radius: 0 0 28px 28px;
      z-index: 10;
    }

    /* 볼터치 */
    .cheek {
      position: absolute;
      bottom: 36px;
      width: 14px;
      height: 8px;
      background: rgba(255, 150, 150, 0.6);
      border-radius: 50%;
      z-index: 10;
    }
    .cheek.left  { left: 18px; }
    .cheek.right { right: 18px; }

    button {
      padding: 12px 32px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #4a90e2;
      color: white;
      transition: background 0.2s;
    }
    button:hover { background: #357abd; }

    #output {
      margin-top: 24px;
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="earth-wrapper">
    <div class="earth">
      <!-- 회전하는 대륙 -->
      <div class="land-layer">
        <svg viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">
          <!-- 첫 번째 타일 -->
          <ellipse cx="30"  cy="45" rx="22" ry="16" fill="#4caf6e"/>
          <ellipse cx="70"  cy="30" rx="14" ry="10" fill="#4caf6e"/>
          <ellipse cx="55"  cy="60" rx="10" ry="8"  fill="#4caf6e"/>
          <ellipse cx="100" cy="50" rx="18" ry="13" fill="#4caf6e"/>
          <ellipse cx="88"  cy="75" rx="10" ry="7"  fill="#4caf6e"/>
          <ellipse cx="140" cy="40" rx="20" ry="12" fill="#4caf6e"/>
          <ellipse cx="160" cy="65" rx="12" ry="9"  fill="#4caf6e"/>
          <!-- 두 번째 타일 (이어붙이기) -->
          <ellipse cx="150" cy="45" rx="22" ry="16" fill="#4caf6e" transform="translate(120,0)"/>
          <ellipse cx="190" cy="30" rx="14" ry="10" fill="#4caf6e" transform="translate(120,0) translate(-240,0)"/>
          <ellipse cx="175" cy="60" rx="10" ry="8"  fill="#4caf6e" transform="translate(120,0) translate(-240,0)"/>
          <ellipse cx="100" cy="50" rx="18" ry="13" fill="#4caf6e" transform="translate(120,0)"/>
          <ellipse cx="88"  cy="75" rx="10" ry="7"  fill="#4caf6e" transform="translate(120,0)"/>
          <ellipse cx="20"  cy="40" rx="20" ry="12" fill="#4caf6e" transform="translate(120,0)"/>
          <ellipse cx="40"  cy="65" rx="12" ry="9"  fill="#4caf6e" transform="translate(120,0)"/>
        </svg>
      </div>

      <!-- 얼굴 표정 -->
      <div class="eyes">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
      </div>
      <div class="mouth"></div>
      <div class="cheek left"></div>
      <div class="cheek right"></div>
    </div>
  </div>

  <button onclick="showHelloAndGo()">안녕</button>
  <div id="output"></div>

  <script>
    function showHelloAndGo() {
      const output = document.getElementById('output');
      output.textContent = 'Hello World';
      setTimeout(() => {
        document.body.style.transition = 'opacity 0.6s';
        document.body.style.opacity = '0';
        setTimeout(() => { window.location.href = 'welcome.html'; }, 600);
      }, 1200);
    }
  </script>

</body>
</html>
